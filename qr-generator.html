<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wintzer — QR Codes</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root { --black:#0e0e0e;--steel:#1c1f24;--panel:#242830;--border:#333840;--accent:#e8a020;--text:#e8e8e8;--muted:#8a909a; }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--black);color:var(--text);font-family:'IBM Plex Mono',monospace;padding-bottom:40px;}
  .header{background:var(--steel);border-bottom:3px solid var(--accent);padding:16px 20px;}
  .header h1{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:2px;}
  .header p{font-size:10px;color:var(--accent);letter-spacing:1.5px;margin-top:2px;}
  .controls{padding:16px;background:var(--panel);border-bottom:1px solid var(--border);}
  .gen-btn{background:var(--accent);color:var(--black);border:none;padding:14px 24px;font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:1.5px;cursor:pointer;width:100%;}
  .section-label{padding:12px 16px 6px;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--accent);border-top:1px solid var(--border);margin-top:8px;}
  .grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;padding:8px 16px;}
  .qr-card{background:var(--steel);border:1.5px solid var(--border);padding:12px;text-align:center;}
  .qr-name{font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:1px;margin-bottom:2px;line-height:1.1;}
  .qr-parent{font-size:9px;color:var(--accent);letter-spacing:1px;margin-bottom:8px;}
  .qr-card img{width:100%;max-width:150px;background:#fff;padding:6px;display:block;margin:0 auto 8px;}
  .dl-btn{display:block;width:100%;background:transparent;border:1px solid var(--border);color:var(--muted);padding:6px;font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:1px;cursor:pointer;text-transform:uppercase;text-decoration:none;}
</style>
</head>
<body>
<div class="header">
  <h1>QR Code Generator</h1>
  <p>G.A. Wintzer &amp; Son Co.</p>
</div>
<div class="controls">
  <button class="gen-btn" onclick="generateAll()">Generate All QR Codes</button>
</div>
<div id="output"></div>
<script>
const BASE='https://brandenleesafety.github.io/Wintzer-Safety';
const locations=[
  {area:'320 West',subs:['Control Room','Basement','Cooker Area','Dock']},
  {area:'440',subs:['Control Area','Basement','Cooker Area','Dock']},
  {area:'320 East',subs:['Control Area','Basement','Dock']},
  {area:'UCO Dock',subs:[]},
  {area:'Hydrolyzer',subs:['Upstairs','Downstairs']},
  {area:'Poultry Grinding Room',subs:['Upstairs','Downstairs']},
  {area:'Meal Silos',subs:[]},
  {area:'Fat Silos',subs:[]},
  {area:'WWTP',subs:[]},
  {area:'Settling Room',subs:[]},
  {area:'Boiler Room',subs:[]},
  {area:'Raw Warehouse',subs:[]},
  {area:'Truck Shelter 1',subs:[]},
  {area:'Truck Shelter 2',subs:[]},
  {area:'Truck Maintenance',subs:[]},
  {area:'South Warehouse',subs:[]}
];
function qrSrc(area,sub){
  let url=BASE+'?area='+area.replace(/ /g,'%20');
  if(sub)url+='&sub='+sub.replace(/ /g,'%20');
  return'https://api.qrserver.com/v1/create-qr-code/?size=200x200&data='+url.replace(/ /g,'%20');
}
function card(area,sub){
  const src=qrSrc(area,sub);
  const label=sub||area;
  const fname=(area+(sub?'-'+sub:'')).replace(/[^a-z0-9]/gi,'-');
  return'<div class="qr-card"><div class="qr-name">'+label+'</div>'+(sub?'<div class="qr-parent">'+area+'</div>':'')+'<img src="'+src+'" loading="lazy"><a href="'+src+'" download="'+fname+'.png" class="dl-btn">Download</a></div>';
}
function generateAll(){
  let html='';
  locations.forEach(function(loc){
    html+='<div class="section-label">'+loc.area+'</div><div class="grid">';
    if(loc.subs.length===0){html+=card(loc.area,null);}
    else{loc.subs.forEach(function(sub){html+=card(loc.area,sub);});}
    html+='</div>';
  });
  document.getElementById('output').innerHTML=html;
}
</script>
</body>
</html>
